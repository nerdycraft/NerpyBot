# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: "en-US"
tone_instructions: >
  Be direct and concise. Focus on bugs, correctness, and architectural issues.
  Skip style comments — Ruff enforces formatting and linting automatically.

reviews:
  profile: "assertive"
  high_level_summary: true
  high_level_summary_in_walkthrough: false
  collapse_walkthrough: true
  poem: false
  review_status: true
  sequence_diagrams: false
  estimate_code_review_effort: false
  assess_linked_issues: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  suggested_reviewers: false
  auto_review:
    enabled: true
    drafts: false
    auto_incremental_review: true
    auto_pause_after_reviewed_commits: 3
    labels:
      - "review"
    ignore_usernames:
      - "dependabot[bot]"
      - "renovate[bot]"
      - "pre-commit-ci[bot]"
  finishing_touches:
    docstrings:
      enabled: false
    unit_tests:
      enabled: false

  path_filters:
    - "!uv.lock"
    - "!web/frontend/package-lock.json"
    - "!web/frontend/tsconfig*.json"
    - "!web/frontend/.vscode/**"
    - "!coverage.xml"
    - "!**/__pycache__/**"
    - "!docs/superpowers/**"

  path_instructions:
    - path: "NerdyPy/**/*.py"
      instructions: |
        - No `return` inside `finally` blocks — suppresses exceptions escaping the `catch`.
          Move cleanup logic after the `try/except` instead.
        - `await` calls (e.g. `interaction.followup.send(...)`) must be placed OUTSIDE
          `with self.bot.session_scope()` blocks to avoid holding the DB connection open during HTTP calls.
        - Catch `SQLAlchemyError` for ops inside `session_scope()`, `discord.HTTPException` for Discord API calls,
          and `(discord.NotFound, discord.Forbidden)` together for stale message/channel references.
        - Use `asyncio.to_thread(fn, *args)` for simple blocking I/O.
          Avoid `asyncio.get_event_loop().run_in_executor()` — `get_event_loop()` from a running coroutine is deprecated in Python 3.13.
          `asyncio.get_running_loop().run_in_executor(executor, fn)` is acceptable when a custom executor is explicitly required.

    - path: "NerdyPy/modules/**/*.py"
      instructions: |
        - Regular `Cog` (not `GroupCog`) does NOT propagate `guild_only` to commands.
          Each `@app_commands.command()` and `Group()` needs `@app_commands.guild_only()` / `guild_only=True` explicitly.
          Never pass `guild_only=True` to `app_commands.Command(name=..., callback=...)` — raises TypeError.
        - Persistent views/buttons must use `discord.ui.View(timeout=None)`. Default ~3 min timeout silently breaks buttons.
        - User-facing errors: raise `NerpyUserException` (subtypes: `NerpyNotFoundError`, `NerpyValidationError`, `NerpyPermissionError`).
          Infrastructure failures: raise `NerpyInfraException` (triggers operator DM).
        - `send_hidden_message()` accepts only `discord.Interaction`. Prefix commands use `ctx.send()` directly.
        - `interaction.response.is_done()` returns False after a failed `send_message()`.
          Wrap user-facing responses in try/except in error handlers before calling `notify_error`.
        - `Guild.get_channel()` is cache-only; returns None on reconnect. Fall back to `await guild.fetch_channel(id)`
          and catch `(discord.NotFound, discord.Forbidden)`.
        - Module-specific permission checks (querying a module config table) stay in the module.
          Only move to `utils/checks.py` if purely Discord role/permission based.
        - Cannot call `send_modal()` after `interaction.response.defer()`.
        - `cog_load` runs before `create_all()`. If the cog accesses new tables in `cog_load`,
          call `self.bot.create_all()` first.

    - path: "NerdyPy/models/**/*.py"
      instructions: |
        - SQLite strips timezone info from DateTime columns — normalize with `.replace(tzinfo=UTC)`
          before comparing against timezone-aware datetimes.
        - SQLite enforces unique constraints row-by-row. Swapping values under a unique column in one flush
          raises IntegrityError. Use a two-phase update (temp values → flush → final values → flush).
        - Use `selectinload` for multiple one-to-many collections on the same parent.
          Two `joinedload` on different one-to-many relationships produce a Cartesian product.

    - path: "database-migrations/versions/**/*.py"
      instructions: |
        - Guard against both "table absent" and "schema already current": `create_all()` on a fresh install
          already builds the latest schema, so `alembic upgrade head` must be a no-op.
          Check column existence before `add_column`, index existence before `create_index`.
        - Must be dialect-aware: use `op.get_bind().dialect.name` to branch SQLite vs PostgreSQL logic.
        - Always use `batch_alter_table` for column operations on SQLite — `op.alter_column()` alone crashes.
        - New columns on existing tables need `server_default`, not just ORM `default`.

    - path: "web/**/*.py"
      instructions: |
        - Call `session.commit()` explicitly before `background_tasks.add_task()`. FastAPI background tasks
          run after the response is sent, so the yield-dependency commit fires too late.
        - `selectinload` for multiple one-to-many collections — same Cartesian product risk as bot models.
        - Support-mode GET handlers must not mutate ORM state — SQLAlchemy auto-commits at request end.

    - path: "web/**/*.ts"
      instructions: |
        - Vue Router types query values as `LocationQueryValue | LocationQueryValue[]`
          (`LocationQueryValue = string | null`). Query param helpers must accept `(string | null)[]`, not `string[]`.

    - path: ".github/workflows/**/*.yml"
      instructions: |
        - Never interpolate untrusted event inputs (PR title/body, issue title, head ref, commit message)
          directly into `run:` steps. Pass through `env:` variables instead.

knowledge_base:
  web_search:
    enabled: false

chat:
  auto_reply: false
