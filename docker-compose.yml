services:
  nerpybot-migrations:
    image: ghcr.io/nerdycraft/nerpybot-database-migrations:latest
    restart: "no"
    environment:
      NERPYBOT_DB_TYPE: sqlite
      NERPYBOT_DB_NAME: /data/db.db
      # ── PostgreSQL alternative ──
      # NERPYBOT_DB_TYPE: postgresql
      # NERPYBOT_DB_NAME: nerpybot
      # NERPYBOT_DB_USERNAME: nerpybot
      # NERPYBOT_DB_PASSWORD: changeme
      # NERPYBOT_DB_HOST: postgres
      # NERPYBOT_DB_PORT: "5432"
    volumes:
      - nerpybot-data:/data
    # depends_on:
    #   postgres:
    #     condition: service_healthy

  nerpybot:
    image: ghcr.io/nerdycraft/nerpybot:latest
    restart: unless-stopped
    depends_on:
      nerpybot-migrations:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      # postgres:
      #   condition: service_healthy
    environment:
      # ── Required ──
      NERPYBOT_TOKEN: "your_bot_token_here"
      NERPYBOT_CLIENT_ID: "your_client_id_here"
      NERPYBOT_OPS: "your_discord_id_here"
      NERPYBOT_MODULES: "application,league,leavemsg,moderation,reactionrole,rolemanage,reminder,tagging,wow"
      # ── Database (SQLite default) ──
      NERPYBOT_DB_TYPE: sqlite
      NERPYBOT_DB_NAME: /data/db.db
      # ── Database (PostgreSQL alternative) ──
      # NERPYBOT_DB_TYPE: postgresql
      # NERPYBOT_DB_NAME: nerpybot
      # NERPYBOT_DB_USERNAME: nerpybot
      # NERPYBOT_DB_PASSWORD: changeme
      # NERPYBOT_DB_HOST: postgres
      # NERPYBOT_DB_PORT: "5432"
      # ── Music (requires tagging in NERPYBOT_MODULES) ──
      # NERPYBOT_YOUTUBE_KEY: "your_youtube_key_here"
      # ── League of Legends ──
      # NERPYBOT_RIOT_KEY: "your_riot_api_key_here"
      # ── World of Warcraft ──
      # NERPYBOT_WOW_CLIENT_ID: "your_wow_client_id_here"
      # NERPYBOT_WOW_CLIENT_SECRET: "your_wow_client_secret_here"
      # ── Error notifications (comma-separated Discord user IDs) ──
      # NERPYBOT_ERROR_RECIPIENTS: "your_discord_id_here"
      # ── Audio tuning ──
      # NERPYBOT_AUDIO_BUFFER_LIMIT: "5"
      # ── Logging ──
      # NERPYBOT_LOG_LEVEL: "debug"
      # ── Web Dashboard (Valkey bridge — required when nerpybot-web is enabled) ──
      NERPYBOT_WEB_VALKEY_URL: "valkey://:changeme@valkey:6379"  # ⚠ match the password set on the valkey service above
    volumes:
      - nerpybot-data:/data

  valkey:
    image: docker.io/valkey/valkey:8-alpine
    restart: unless-stopped
    command: ["valkey-server", "--requirepass", "changeme"]  # ⚠ change this and update NERPYBOT_WEB_VALKEY_URL in both services
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "-a", "changeme", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  nerpybot-web:
    image: ghcr.io/nerdycraft/nerpybot-web:latest
    restart: unless-stopped
    depends_on:
      nerpybot-migrations:
        condition: service_completed_successfully
      valkey:
        condition: service_healthy
      # postgres:
      #   condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      # ── Required ──
      NERPYBOT_WEB_CLIENT_ID: "your_client_id_here"
      NERPYBOT_WEB_CLIENT_SECRET: "your_discord_client_secret_here"
      NERPYBOT_WEB_REDIRECT_URI: "http://localhost:8000/api/auth/callback"
      NERPYBOT_WEB_JWT_SECRET: "CHANGEME__USE_A_LONG_RANDOM_SECRET" # ⚠ REQUIRED: replace with a cryptographically random string (e.g. openssl rand -hex 32) — service will accept tokens signed with any value, including this one
      NERPYBOT_WEB_OPS: "your_discord_id_here"
      NERPYBOT_WEB_VALKEY_URL: "valkey://:changeme@valkey:6379"  # ⚠ match the password set on the valkey service above
      # ── Database (must match bot config) ──
      NERPYBOT_WEB_DB_TYPE: sqlite
      NERPYBOT_WEB_DB_NAME: /data/db.db
      # NERPYBOT_WEB_DB_TYPE: postgresql
      # NERPYBOT_WEB_DB_NAME: nerpybot
      # NERPYBOT_WEB_DB_USERNAME: nerpybot
      # NERPYBOT_WEB_DB_PASSWORD: changeme
      # NERPYBOT_WEB_DB_HOST: postgres
      # NERPYBOT_WEB_DB_PORT: "5432"
      # ── Optional ──
      # NERPYBOT_WEB_JWT_EXPIRY_HOURS: "24"
      # NERPYBOT_WEB_FRONTEND_URL: "http://localhost:5173"  # set only for local dev (Vite on a different port); leave unset in production
      # NERPYBOT_WEB_LOG_LEVEL: "debug"
    volumes:
      - nerpybot-data:/data

  # ── Uncomment to use PostgreSQL instead of SQLite ──
  # postgres:
  #   image: docker.io/postgres:18-alpine
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_DB: nerpybot
  #     POSTGRES_USER: nerpybot
  #     POSTGRES_PASSWORD: changeme  # change this!
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U nerpybot"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

volumes:
  nerpybot-data:
  valkey-data:
  # postgres-data:
