name: Build & Push Docker Images

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - "NerdyPy/**"
      - "database-migrations/**"
      - "alembic.ini"
      - ".github/workflows/docker.yml"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    if: github.ref_type != 'tag'
    permissions:
      contents: read
    outputs:
      bot: ${{ steps.filter.outputs.bot }}
      migrations: ${{ steps.filter.outputs.migrations }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            bot:
              - 'Dockerfile'
              - '.dockerignore'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'NerdyPy/**'
              - '.github/workflows/docker.yml'
            migrations:
              - 'Dockerfile'
              - '.dockerignore'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'database-migrations/**'
              - 'alembic.ini'
              - '.github/workflows/docker.yml'

  build-bot:
    name: Build & Push NerpyBot Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.bot == 'true')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from git
        id: version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            RAW=$(git describe --tags --always | sed 's/^v//')
            if [[ "$RAW" =~ ^([0-9]+\.[0-9]+\.[0-9]+)-([0-9]+)-g([a-f0-9]+)$ ]]; then
              VERSION="${BASH_REMATCH[1]}.dev${BASH_REMATCH[2]}+g${BASH_REMATCH[3]}"
            else
              VERSION="$RAW"
            fi
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Detected version: ${VERSION}"

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: bot
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed image
        env:
          EXPECTED_VERSION: ${{ steps.version.outputs.version }}
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME,,}:${GITHUB_SHA::7}"
          docker pull "${IMAGE}"
          ACTUAL=$(docker run --rm "${IMAGE}" python bot.py -V | sed 's/NerpyBot v//')
          echo "Expected: ${EXPECTED_VERSION}"
          echo "Actual:   ${ACTUAL}"
          if [[ "${ACTUAL}" != "${EXPECTED_VERSION}" ]]; then
            echo "::error::Version mismatch in pushed image!"
            exit 1
          fi
          echo "NerpyBot image verified (v${ACTUAL})"

  build-migrations:
    name: Build & Push Migrations Image
    runs-on: ubuntu-latest
    needs: [changes]
    if: always() && (needs.changes.result == 'skipped' || needs.changes.outputs.migrations == 'true')
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-database-migrations
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v6
        with:
          context: .
          target: migrations
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify pushed image
        run: |
          IMAGE="${REGISTRY}/${IMAGE_NAME,,}-database-migrations:${GITHUB_SHA::7}"
          docker pull "${IMAGE}"
          docker run --rm "${IMAGE}" alembic heads
          echo "✅ Migrations image verified"
