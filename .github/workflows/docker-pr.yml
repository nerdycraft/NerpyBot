name: Validate Docker Build (PR)

on:
  pull_request:
    branches: [main]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "pyproject.toml"
      - "uv.lock"
      - "NerdyPy/**"
      - "database-migrations/**"
      - "alembic.ini"
      - "web/**"
      - ".github/workflows/docker-pr.yml"

jobs:
  changes:
    name: Detect Changed Paths
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      bot: ${{ steps.filter.outputs.bot }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            bot:
              - 'Dockerfile'
              - '.dockerignore'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'NerdyPy/**'
              - 'database-migrations/**'
              - 'alembic.ini'
              - '.github/workflows/docker-pr.yml'
            web:
              - 'Dockerfile'
              - '.dockerignore'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'web/**'
              - 'NerdyPy/**'
              - '.github/workflows/docker-pr.yml'

  compute-matrix:
    name: Compute Build Matrix
    runs-on: ubuntu-latest
    needs: [changes]
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      has_targets: ${{ steps.set.outputs.has_targets }}
    steps:
      - name: Build target matrix
        id: set
        env:
          BOT: ${{ needs.changes.outputs.bot }}
          WEB: ${{ needs.changes.outputs.web }}
        run: |
          targets=()
          [[ "$BOT" == "true" ]] && targets+=('{"target":"bot","name":"NerpyBot","tag":"nerpybot:smoke-test"}')
          [[ "$WEB" == "true" ]] && targets+=('{"target":"web","name":"Web Dashboard","tag":"nerpybot-web:smoke-test"}')
          if [[ ${#targets[@]} -gt 0 ]]; then
            matrix=$(printf '%s\n' "${targets[@]}" | jq -sc '{include: .}')
            echo "has_targets=true" >> "$GITHUB_OUTPUT"
          else
            matrix='{"include":[]}'
            echo "has_targets=false" >> "$GITHUB_OUTPUT"
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  validate:
    name: Validate ${{ matrix.name }} Image
    runs-on: ubuntu-latest
    needs: [compute-matrix]
    if: needs.compute-matrix.outputs.has_targets == 'true'
    permissions:
      contents: read
    strategy:
      matrix: ${{ fromJson(needs.compute-matrix.outputs.matrix) }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build ${{ matrix.name }} image
        uses: docker/build-push-action@v7
        with:
          context: .
          target: ${{ matrix.target }}
          load: true
          tags: ${{ matrix.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test NerpyBot
        if: matrix.target == 'bot'
        run: |
          docker run --rm nerpybot:smoke-test python -c "from bot import NerpyBot; print('OK')"

      - name: Smoke test Web Dashboard
        if: matrix.target == 'web'
        run: |
          docker run --rm \
            -e NERPYBOT_WEB_CLIENT_ID=smoke \
            -e NERPYBOT_WEB_CLIENT_SECRET=smoke \
            -e NERPYBOT_WEB_JWT_SECRET=smoke_secret_placeholder \
            -e NERPYBOT_WEB_OPS=1 \
            nerpybot-web:smoke-test \
            python -c "from web.app import create_app; create_app(); print('OK')"
