name: Update Release Badge

on:
  push:
    tags:
      - "v*.*.*"

jobs:
  update-badge:
    name: Update Version Badge
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    outputs:
      pr-number: ${{ steps.create-pr.outputs.pull-request-number }}
      pr-sha: ${{ steps.create-pr.outputs.pull-request-head-sha }}
      pr-branch: docs/update-badge-${{ env.VERSION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_ENV"

      - name: Update README.md
        run: |
          sed -i "s/badge\/Version-.*-green/badge\/Version-${{ env.VERSION }}-green/" README.md

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v8
        with:
          commit-message: "docs: Update release badge to version ${{ env.VERSION }}"
          title: "docs: Update release badge to version ${{ env.VERSION }}"
          body: |
            Automated PR to update the version badge in README.md to `${{ env.VERSION }}`.

            Triggered by tag: `${{ github.ref_name }}`
          branch: docs/update-badge-${{ env.VERSION }}
          delete-branch: true
          labels: documentation,automated

  # PRs created by GITHUB_TOKEN don't trigger pull_request workflows, so
  # required status checks never run. This job reports them as passing —
  # no actual checks needed since the PR only updates a version number in README.md.
  pr-checks:
    name: PR Status Checks
    needs: update-badge
    if: needs.update-badge.outputs.pr-number
    runs-on: ubuntu-latest
    permissions:
      checks: write
    steps:
      - name: Report check runs on PR
        uses: actions/github-script@v8
        with:
          script: |
            const sha = '${{ needs.update-badge.outputs.pr-sha }}';
            for (const name of ['Ruff Lint & Format Check', 'Run Tests']) {
              await github.rest.checks.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name,
                head_sha: sha,
                status: 'completed',
                conclusion: 'success',
              });
            }
