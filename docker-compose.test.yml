# Self-contained test stack — no Valkey, no bot, no Discord credentials needed.
#
# Usage:
#   docker compose -f docker-compose.test.yml up --build
#   open http://localhost:8080
#
# VITE_TEST_MODE is baked into the JS bundle at build time (compile-time constant).
# NERPYBOT_TEST_MODE is read by FastAPI at runtime to enable the test auth bypass.

services:
  dashboard:
    build:
      context: .
      target: web
      args:
        VITE_TEST_MODE: "true"
    environment:
      NERPYBOT_TEST_MODE: "true"
      NERPYBOT_WEB_JWT_SECRET: "test-secret-not-for-production"
      # Dummy values to satisfy config validation — not used in test mode
      NERPYBOT_WEB_CLIENT_ID: "0"
      NERPYBOT_WEB_CLIENT_SECRET: "test"
      NERPYBOT_WEB_OPS: "0"
      NERPYBOT_WEB_LEGAL_NAME: "Test Person"
      NERPYBOT_WEB_LEGAL_STREET: "Test Street 1"
      NERPYBOT_WEB_LEGAL_ZIP_CITY: "12345 Test City"
      NERPYBOT_WEB_LEGAL_COUNTRY_EN: "Germany"
      NERPYBOT_WEB_LEGAL_COUNTRY_DE: "Deutschland"
      NERPYBOT_WEB_LEGAL_EMAIL: "legal@example.com"
    ports:
      - "8080:8000"
